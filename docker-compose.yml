version: '3.8'

volumes:
  n8n_data:
  n8n_postgres_data: # Distinct volume name so it doesn't mix with your other DBs

services:
  n8n-postgres: # Renamed service to avoid any naming collisions
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${N8N_POSTGRES_PASSWORD:?Error: N8N_POSTGRES_PASSWORD not set in .env}
      - POSTGRES_DB=n8n
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    # Notice: No 'ports' section here. This prevents the conflict with your existing 5432 port.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U n8n -d n8n"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    ports:
      - "5678:5678" # This port is free according to your screenshot
    environment:
      # Tell n8n its own external URL for OAuth and Webhooks
      - WEBHOOK_URL=http://localhost:5678/
      
      # Database connection
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres # Matches the service name above
      - DB_POSTGRESDB_PORT=5432 # This is the internal Docker port, which is perfectly fine to keep as 5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_POSTGRES_PASSWORD:?Error: N8N_POSTGRES_PASSWORD not set in .env}
      
      # Optional: Enforce a specific timezone for your scheduled backups
      - GENERIC_TIMEZONE=Europe/Berlin
    volumes:
      - n8n_data:/home/node/.n8n
      - ./scripts/n8n/backups:/backup # The folder for your auto-backup solution
    depends_on:
      n8n-postgres:
        condition: service_healthy
