# ╔══════════════════════════════════════════════════════════════╗
# ║  Deploy Backend → DigitalOcean App Platform                ║
# ║                                                             ║
# ║  Triggers on push to main when backend code changes.       ║
# ║  Uses doctl to trigger a new deployment on the existing    ║
# ║  DigitalOcean App.                                         ║
# ║                                                             ║
# ║  Required GitHub Secrets:                                  ║
# ║  • DIGITALOCEAN_ACCESS_TOKEN                                ║
# ║  • DIGITALOCEAN_APP_ID                                      ║
# ╚══════════════════════════════════════════════════════════════╝

name: Deploy Backend (DigitalOcean)

on:
  push:
    branches: [main]
    paths:
      - "apps/tracker/**"
      - "apps/orchestrator/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".do/app.yaml"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy-digitalocean:
    name: Deploy Orchestrator → DigitalOcean
    needs: ci-gate
    runs-on: ubuntu-latest
    environment:
      name: production-backend
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Trigger deployment
        run: |
          doctl apps create-deployment ${{ secrets.DIGITALOCEAN_APP_ID }} --wait --format ID
          echo "### 🐳 Backend deployed to DigitalOcean!" >> "$GITHUB_STEP_SUMMARY"
          echo "**App ID:** ${{ secrets.DIGITALOCEAN_APP_ID }}" >> "$GITHUB_STEP_SUMMARY"
