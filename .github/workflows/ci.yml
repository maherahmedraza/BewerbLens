name: BewerbLens CI

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest loguru pydantic pydantic-settings supabase google-genai google-auth-oauthlib google-api-python-client tenacity

      - name: Lint with Ruff
        run: ruff check apps/tracker apps/orchestrator

      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/apps/tracker
          pytest apps/tracker/tests

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
