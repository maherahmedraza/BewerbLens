# ╔══════════════════════════════════════════════════════════════╗
# ║  BewerbLens CI — Lint, Test & Build                        ║
# ║                                                             ║
# ║  Runs on every push and PR to main and dev.                ║
# ║  Both deploy workflows depend on this passing first.       ║
# ╚══════════════════════════════════════════════════════════════╝

name: BewerbLens CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: Lint & Test ────────────────────────────────────────
  backend-ci:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest

      - name: Lint with Ruff
        run: ruff check apps/tracker apps/orchestrator

      - name: Run tests
        run: pytest apps/tracker/tests -v --tb=short
        env:
          PYTHONPATH: apps/tracker

  # ── Next.js: Lint & Build ──────────────────────────────────────
  dashboard-ci:
    name: Dashboard — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder_key' }}
          NEXT_PUBLIC_ORCHESTRATOR_URL: ${{ secrets.NEXT_PUBLIC_ORCHESTRATOR_URL || 'http://localhost:8000' }}

  # ── Security Scan ──────────────────────────────────────────────
  security-scan:
    name: Security — Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
