name: Sync Secrets to Vercel & DigitalOcean

on:
  workflow_dispatch:
    # Trigger manually when secrets are updated

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (for Vercel CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Install DigitalOcean doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Run Secret Synchronization Script
        env:
          # Auth and IDs
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DIGITALOCEAN_APP_ID: ${{ secrets.DIGITALOCEAN_APP_ID }}
          DIGITALOCEAN_DEV_APP_ID: ${{ secrets.DIGITALOCEAN_DEV_APP_ID }}
          
          # Secrets to sync
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_ENABLED: ${{ secrets.TELEGRAM_ENABLED }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BATCH_SIZE: ${{ secrets.BATCH_SIZE }}
          MIN_CONFIDENCE: ${{ secrets.MIN_CONFIDENCE }}
          ORCHESTRATOR_API_KEY: ${{ secrets.ORCHESTRATOR_API_KEY }}
          ENCRYPTION_SECRET: ${{ secrets.ENCRYPTION_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          FOLLOW_UP_REMINDER_DAYS: ${{ secrets.FOLLOW_UP_REMINDER_DAYS }}
          FOLLOW_UP_REMINDER_REPEAT_DAYS: ${{ secrets.FOLLOW_UP_REMINDER_REPEAT_DAYS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_OAUTH_REDIRECT_URI: ${{ secrets.GOOGLE_OAUTH_REDIRECT_URI }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ORCHESTRATOR_URL: ${{ secrets.NEXT_PUBLIC_ORCHESTRATOR_URL }}
          ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
          TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}
          TELEGRAM_LINK_SECRET: ${{ secrets.TELEGRAM_LINK_SECRET }}
        run: python scripts/sync_secrets.py
