# DigitalOcean App Platform — App Spec
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/
name: bewerblens-backend
region: fra  # Frankfurt — lowest latency for European users

services:
  - name: orchestrator
    dockerfile_path: Dockerfile
    github:
      repo: maherahmedraza/BewerbLens
      branch: main
      deploy_on_push: true
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: SUPABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GEMINI_MODEL
        scope: RUN_TIME
        value: gemini-3.1-flash-lite-preview
      - key: BATCH_SIZE
        scope: RUN_TIME
        value: "10"
      - key: MIN_CONFIDENCE
        scope: RUN_TIME
        value: "0.55"
      - key: ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_ENABLED
        scope: RUN_TIME
        value: "true"
