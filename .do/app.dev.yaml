# DigitalOcean App Platform — Preview App Spec
name: bewerblens-backend-preview
region: fra

services:
  - name: orchestrator-preview
    dockerfile_path: Dockerfile
    github:
      repo: maherahmedraza/BewerbLens
      branch: dev
      deploy_on_push: false
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: SUPABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GEMINI_MODEL
        scope: RUN_TIME
        value: gemini-3.1-flash-lite-preview
      - key: ENCRYPTION_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ORCHESTRATOR_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: TELEGRAM_ENABLED
        scope: RUN_TIME
        value: "true"
      - key: FOLLOW_UP_REMINDER_DAYS
        scope: RUN_TIME
        value: "14"
      - key: FOLLOW_UP_REMINDER_REPEAT_DAYS
        scope: RUN_TIME
        value: "7"
